version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: qshield-mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - qshield-net
    restart: unless-stopped

  proxy:
    build: ./proxy
    container_name: qshield-proxy
    ports:
      - "8883:8883"
      - "1884:1884"
      - "8080:8080"
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto:1883
    networks:
      - qshield-net
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: qshield-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - proxy
    networks:
      - qshield-net
    restart: unless-stopped

  legacy-device:
    build: ./iot-fleet
    container_name: qshield-legacy-device
    command: ["python", "-u", "legacy_device.py"]
    depends_on:
      - proxy
    environment:
      - PROXY_HOST=proxy
    networks:
      - qshield-net
    restart: unless-stopped

  pqc-device-768:
    build: ./iot-fleet
    container_name: qshield-pqc-768
    command: ["python", "-u", "pqc_device.py", "--kem", "Kyber768"]
    depends_on:
      - proxy
    environment:
      - PROXY_HOST=proxy
    networks:
      - qshield-net
    restart: unless-stopped

  pqc-device-512:
    build: ./iot-fleet
    container_name: qshield-pqc-512
    command: ["python", "-u", "pqc_device.py", "--kem", "Kyber512"]
    depends_on:
      - proxy
    environment:
      - PROXY_HOST=proxy
    networks:
      - qshield-net
    restart: unless-stopped

  pqc-device-1024:
    build: ./iot-fleet
    container_name: qshield-pqc-1024
    command: ["python", "-u", "pqc_device.py", "--kem", "Kyber1024"]
    depends_on:
      - proxy
    environment:
      - PROXY_HOST=proxy
    networks:
      - qshield-net
    restart: unless-stopped


networks:
  qshield-net:
    driver: bridge
